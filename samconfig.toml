# SAM deployment configuration
# Run `sam deploy` and these defaults are used automatically.
# To reconfigure, run `sam deploy --guided`

version = 0.1

[default.deploy.parameters]
stack_name = "documind-dev"
resolve_s3 = true
s3_prefix = "documind-dev"
confirm_changeset = true
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
parameter_overrides = "Stage=\"dev\""
image_repositories = []


[default.global.parameters]
region = "us-east-1"
[staging.deploy.parameters]
stack_name = "documind-staging"
resolve_s3 = true
s3_prefix = "documind-staging"
region = "us-east-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
parameter_overrides = "Stage=\"staging\""

[prod.deploy.parameters]
stack_name = "documind-prod"
resolve_s3 = true
s3_prefix = "documind-prod"
region = "us-east-1"
confirm_changeset = false
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
parameter_overrides = "Stage=\"prod\""