AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  DocuMind - Serverless Intelligent Document Processing Pipeline Solvexis Engineering | April 2026

# ──────────────────────────────────────────────
# Global defaults applied to every Lambda function
# ──────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        DOCUMENTS_TABLE: !Ref DocumentsTable
        UPLOAD_BUCKET: !Sub documind-uploads-${Stage}-${AWS::AccountId}
    Tracing: Active
    Architectures:
    - arm64
  Api:
    Cors:
      AllowMethods: "'GET,POST,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"
    TracingEnabled: true

# ──────────────────────────────────────────────
# Parameters — configurable per environment
# ──────────────────────────────────────────────
Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
    - dev
    - staging
    - prod
    Description: Deployment stage

# ──────────────────────────────────────────────
# Resources
# ──────────────────────────────────────────────
Resources:

  # ════════════════════════════════════════════
  # S3 — Document Upload Bucket
  # ════════════════════════════════════════════
  UploadBucket:
    Type: AWS::S3::Bucket
    DependsOn: OrchestratorInvokePermission
    Properties:
      BucketName: !Sub documind-uploads-${Stage}-${AWS::AccountId}
      NotificationConfiguration:
        LambdaConfigurations:
        - Event: s3:ObjectCreated:*
          Function: !GetAtt OrchestratorFunction.Arn
          Filter:
            S3Key:
              Rules:
              - Name: prefix
                Value: uploads/
      CorsConfiguration:
        CorsRules:
        - AllowedHeaders: [ '*' ]
          AllowedMethods: [ GET, PUT, POST ]
          AllowedOrigins: [ '*' ]
          MaxAge: 3600
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
        - Id: ArchiveOldDocuments
          Status: Enabled
          Transitions:
          - TransitionInDays: 90
            StorageClass: GLACIER
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ════════════════════════════════════════════
  # Lambda Permission — Allow S3 to invoke Orchestrator
  # ════════════════════════════════════════════
  OrchestratorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt OrchestratorFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub arn:aws:s3:::documind-uploads-${Stage}-${AWS::AccountId}

  # ════════════════════════════════════════════
  # DynamoDB — Structured Results Storage
  # ════════════════════════════════════════════
  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub DocuMind-Documents-${Stage}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: documentId
        AttributeType: S
      - AttributeName: createdAt
        AttributeType: S
      - AttributeName: status
        AttributeType: S
      KeySchema:
      - AttributeName: documentId
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: StatusCreatedAtIndex
        KeySchema:
        - AttributeName: status
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  # ════════════════════════════════════════════
  # Dead Letter Queue — Failed Processing
  # ════════════════════════════════════════════
  ProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub documind-processing-dlq-${Stage}
      MessageRetentionPeriod: 1209600

  # ════════════════════════════════════════════
  # Lambda — Pre-Signed URL Generator
  # ════════════════════════════════════════════
  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub documind-upload-${Stage}
      CodeUri: src/upload/
      Handler: app.handler
      Description: Generates pre-signed S3 URLs and creates DynamoDB records
      Policies:
      - S3CrudPolicy:
          BucketName: !Sub documind-uploads-${Stage}-${AWS::AccountId}
      - DynamoDBCrudPolicy:
          TableName: !Ref DocumentsTable
      Events:
        UploadApi:
          Type: Api
          Properties:
            Path: /api/documents/upload
            Method: POST

  # ════════════════════════════════════════════
  # Lambda — Orchestrator (triggered by S3)
  # ════════════════════════════════════════════
  OrchestratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub documind-orchestrator-${Stage}
      CodeUri: src/orchestrator/
      Handler: app.handler
      Timeout: 60
      MemorySize: 512
      Description: Processes documents via Textract and Comprehend
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt ProcessingDLQ.Arn
      Policies:
      - S3ReadPolicy:
          BucketName: !Sub documind-uploads-${Stage}-${AWS::AccountId}
      - DynamoDBCrudPolicy:
          TableName: !Ref DocumentsTable
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - textract:DetectDocumentText
          - textract:AnalyzeDocument
          Resource: '*'
        - Effect: Allow
          Action:
          - comprehend:DetectEntities
          - comprehend:DetectSentiment
          Resource: '*'

  # ════════════════════════════════════════════
  # Lambda — Results API
  # ════════════════════════════════════════════
  ResultsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub documind-results-${Stage}
      CodeUri: src/results/
      Handler: app.handler
      Description: Serves document results via API Gateway
      Policies:
      - DynamoDBCrudPolicy:
          TableName: !Ref DocumentsTable
      - S3CrudPolicy:
          BucketName: !Sub documind-uploads-${Stage}-${AWS::AccountId}
      Events:
        GetDocuments:
          Type: Api
          Properties:
            Path: /api/documents
            Method: GET
        GetDocumentById:
          Type: Api
          Properties:
            Path: /api/documents/{id}
            Method: GET
        DeleteDocument:
          Type: Api
          Properties:
            Path: /api/documents/{id}
            Method: DELETE

  # ════════════════════════════════════════════
  # CloudWatch — Alarms
  # ════════════════════════════════════════════
  OrchestratorErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub DocuMind-OrchestratorErrors-${Stage}
      AlarmDescription: Fires when the orchestrator Lambda has errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
      - Name: FunctionName
        Value: !Ref OrchestratorFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  DLQDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub DocuMind-DLQDepth-${Stage}
      AlarmDescription: Fires when failed documents land in the DLQ
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
      - Name: QueueName
        Value: !GetAtt ProcessingDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

# ──────────────────────────────────────────────
# Outputs — values you'll need after deployment
# ──────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Stage

  UploadBucketName:
    Description: S3 bucket for document uploads
    Value: !Ref UploadBucket

  DocumentsTableName:
    Description: DynamoDB table for document results
    Value: !Ref DocumentsTable

  OrchestratorFunctionArn:
    Description: ARN of the orchestrator Lambda
    Value: !GetAtt OrchestratorFunction.Arn

  DLQUrl:
    Description: Dead-letter queue URL for failed processing
    Value: !Ref ProcessingDLQ
